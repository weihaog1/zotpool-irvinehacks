<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ZotPool - UCI Carpooling</title>
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@600;700;800&display=swap" rel="stylesheet">
    <style>
      body {
        background-color: #f8fafc;
      }
      /* Custom scrollbar */
      ::-webkit-scrollbar {
        width: 8px;
        height: 8px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #94a3b8;
      }

      /* Mesh Gradient Animation */
      .mesh-bg {
        background-color: #0064A4;
        background-image: 
            radial-gradient(at 40% 20%, hsla(49,100%,50%,1) 0px, transparent 15%),
            radial-gradient(at 80% 0%, hsla(210,100%,35%,1) 0px, transparent 50%),
            radial-gradient(at 0% 50%, hsla(215,100%,60%,1) 0px, transparent 50%),
            radial-gradient(at 80% 50%, hsla(210,100%,30%,1) 0px, transparent 50%),
            radial-gradient(at 0% 100%, hsla(49,100%,50%,1) 0px, transparent 15%),
            radial-gradient(at 80% 100%, hsla(215,100%,40%,1) 0px, transparent 50%),
            radial-gradient(at 0% 0%, hsla(215,100%,40%,1) 0px, transparent 50%);
        background-size: 200% 200%;
        animation: mesh 20s ease infinite;
      }

      @keyframes mesh {
        0%{background-position:0% 50%}
        50%{background-position:100% 50%}
        100%{background-position:0% 50%}
      }

      /* Glassmorphism */
      .glass {
        background: rgba(255, 255, 255, 0.75);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        border: 1px solid rgba(255, 255, 255, 0.6);
      }

      .glass-solid {
        background: rgb(255, 255, 255);
        backdrop-filter: none;
        -webkit-backdrop-filter: none;
        border: 1px solid rgba(226, 232, 240, 0.8);
      }
      
      .glass-panel {
        background: rgba(255, 255, 255, 0.9);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border: 1px solid rgba(255, 255, 255, 0.8);
        box-shadow: 0 4px 30px rgba(0, 0, 0, 0.05);
      }

      .glass-dark {
        background: rgba(15, 23, 42, 0.6);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border: 1px solid rgba(255, 255, 255, 0.05);
      }

      /* Typography */
      h1, h2, h3, h4, h5, h6 {
        font-family: 'Plus Jakarta Sans', sans-serif;
      }
      
      /* Utilities */
      .text-balance {
        text-wrap: balance;
      }
    </style>
<link rel="stylesheet" href="/src/index.css">
</head>
  <body class="antialiased text-slate-900 bg-slate-50 selection:bg-uci-gold selection:text-uci-dark">
    <div id="root"></div>
  <script type="module" src="/src/index.tsx"></script>
</body>
</html>
